<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP ACME - Gestión de Inventario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h2>ACME ERP</h2>
                <p>Módulo Logístico</p>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="#">📦 Inventario</a></li>
                    <li><a href="#">👥 Proveedores</a></li>
                    <li><a href="#">📊 Reportes</a></li>
                    <li><a href="#">⚙️ Configuración</a></li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="topbar">
                <h2>Gestión de Productos</h2>
                <div class="user-profile">
                    <span>Admin Sistema</span>
                </div>
            </header>

            <div class="content-wrapper">
                <section class="card form-card">
                    <h3>Registrar Nuevo Producto</h3>
                    <form id="productoForm">
                        <div class="form-group">
                            <label for="nombre">Nombre del Producto</label>
                            <input type="text" id="nombre" placeholder="Ej: Taladro Percutor Makita" required>
                        </div>
                        <div class="form-group">
                            <label for="descripcion">Descripción Breve</label>
                            <input type="text" id="descripcion" placeholder="Ej: 750W con maletín incluido" required>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="precio">Precio Unitario (CLP)</label>
                                <input type="number" id="precio" placeholder="Ej: 45000" required>
                            </div>
                            <div class="form-group">
                                <label for="stock">Stock Inicial</label>
                                <input type="number" id="stock" placeholder="Ej: 15" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Guardar Producto</button>
                    </form>
                </section>

                <section class="card table-card">
                    <h3>Inventario Actual</h3>
                    <div class="table-responsive">
                        <table id="tablaProductos">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
