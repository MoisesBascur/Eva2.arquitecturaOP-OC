<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ERP ACME - Gestión de Productos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        form { display: grid; gap: 10px; margin-bottom: 20px; }
        input, button { padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #0056b3; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #004494; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ferreterías ACME - Inventario</h1>
        
        <form id="productoForm">
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
            <input type="text" id="descripcion" placeholder="Descripción" required>
            <input type="number" id="precio" placeholder="Precio" required>
            <input type="number" id="stock" placeholder="Stock" required>
            <button type="submit">Agregar Producto</button>
        </form>

        <table id="tablaProductos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function cargarProductos() {
            const res = await fetch('/api/productos');
            const productos = await res.json();
            const tbody = document.querySelector('#tablaProductos tbody');
            tbody.innerHTML = '';
            productos.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.id}</td><td>${p.nombre}</td><td>${p.descripcion}</td><td>$${p.precio}</td><td>${p.stock}</td></tr>`;
            });
        }

        document.getElementById('productoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevoProducto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: document.getElementById('precio').value,
                stock: document.getElementById('stock').value
            };
            await fetch('/api/productos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoProducto)
            });
            e.target.reset();
            cargarProductos();
        });

        cargarProductos();
    </script>
</body>
</html>
